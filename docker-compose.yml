# Docker Compose orchestration for HILIPS
#
# Usage:
#   export GEMINI_API_KEY=your-key-here
#   docker compose up --build
#
# Open:
#   Frontend  →  http://localhost:3000
#   Backend   →  http://localhost:8000
#   API docs  →  http://localhost:8000/docs
#
# GPU support (optional, requires NVIDIA Container Toolkit):
#   docker compose --profile gpu up --build
#
# Notes:
# - The backend requires the SAM2 checkpoint at
#   ./backend/checkpoints/sam2.1_hiera_large.pt — download it once from
#   https://github.com/facebookresearch/sam2 and the volume mount below
#   will expose it to the container.
# - Annotation, image, and model directories are mounted from the host
#   so data persists across container restarts.

services:
  backend:
    build:
      context: ./backend
    image: hilips-backend:1.0.0
    container_name: hilips-backend
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      TRAINED_MODELS_DIR: /app/trained_models
      ANNOTATIONS_DIR: /app/annotations
      TRAINING_DATASETS_DIR: /app/training_datasets
    ports:
      - "8000:8000"
    volumes:
      - ./backend/checkpoints:/app/checkpoints
      - ./backend/annotations:/app/annotations
      - ./backend/images:/app/images
      - ./backend/trained_models:/app/trained_models
      - ./backend/training_datasets:/app/training_datasets
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    image: hilips-frontend:1.0.0
    container_name: hilips-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend-gpu:
    extends:
      service: backend
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
